services:
  fluid:
    image: ghcr.io/provid-gg/fluid.provid.gg:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./output:/app/output
    environment:
      NODE_ENV: production
      PORT: 3000
      OUTPUT_DIR: /app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/internal-api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    shm_size: '256mb'
